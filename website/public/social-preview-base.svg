<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" style="stop-color:#2a1a00" />
            <stop offset="100%" style="stop-color:#101010" />
        </radialGradient>
        
        <linearGradient id="bottom-to-top" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" style="stop-color:#E5BA73" />
            <stop offset="100%" style="stop-color:#FAF8F1" />
        </linearGradient>

        <linearGradient id="top-to-bottom" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" style="stop-color:#FAF8F1" />
            <stop offset="100%" style="stop-color:#E5BA73" />
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg-glow)" />

    <!-- Subtle abstract shapes or film strip -->
    <path d="M-100 600 Q 300 450 600 600 T 1300 600" fill="none" stroke="#ec8200" stroke-width="2" stroke-opacity="0.2" />
    <path d="M-100 580 Q 300 430 600 580 T 1300 580" fill="none" stroke="#e5ba73" stroke-width="1" stroke-opacity="0.1" />

    <!-- Center content group -->
    <g transform="translate(600, 220)">
        
        <!-- Logo -->
        <g transform="translate(-100, -120) scale(2)">
            <circle cx="50" cy="50" r="45" stroke="url(#bottom-to-top)" stroke-width="10" fill="#1f1f1f" />
            <polygon points="65,50 43,65 43,35" stroke-linejoin="round" stroke-width="16" stroke="url(#top-to-bottom)"/>
        </g>
        
        <!-- Text -->
        <text x="0" y="160" font-family="'Montserrat', sans-serif, 'Helvetica Neue', Helvetica, Arial" font-size="64" font-weight="800" fill="#fafafa" text-anchor="middle" letter-spacing="2">Movie Collection Visualizer</text>
        <text x="0" y="240" font-family="'Montserrat', sans-serif, 'Helvetica Neue', Helvetica, Arial" font-size="28" font-weight="500" fill="#969696" text-anchor="middle" letter-spacing="1">Organize and visualize your movie collection effortlessly.</text>
        
    </g>
</svg>
